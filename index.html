<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Usman Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 350px;
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .switch-link {
            text-align: center;
            margin-top: 15px;
        }
        
        .switch-link a {
            color: #667eea;
            text-decoration: none;
        }
        
        .hidden {
            display: none;
        }
        
        .error {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        
        .success {
            color: green;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div id="loginSection">
            <h2>🔐 Login</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit">Login</button>
            </form>
            <p id="loginError" class="error"></p>
            <p class="switch-link">
                New user? <a href="#" onclick="showRegister()">Register here</a>
            </p>
        </div>
        
        <!-- Register Section -->
        <div id="registerSection" class="hidden">
            <h2>📝 Register</h2>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="regConfirmPassword" required>
                </div>
                <button type="submit">Register</button>
            </form>
            <p id="regError" class="error"></p>
            <p id="regSuccess" class="success"></p>
            <p class="switch-link">
                Already registered? <a href="#" onclick="showLogin()">Login here</a>
            </p>
        </div>
    </div>
    
    <script>
        // Check if already logged in
        if (localStorage.getItem('loggedIn') === 'true') {
            window.location.href = 'main.html';
        }
        
        function showRegister() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('registerSection').classList.remove('hidden');
        }
        
        function showLogin() {
            document.getElementById('registerSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
        }
        
        function handleRegister(e) {
            e.preventDefault();
            
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            document.getElementById('regError').textContent = '';
            document.getElementById('regSuccess').textContent = '';
            
            if (password !== confirmPassword) {
                document.getElementById('regError').textContent = 'Passwords do not match!';
                return;
            }
            
            if (password.length < 6) {
                document.getElementById('regError').textContent = 'Password must be 6+ characters!';
                return;
            }
            
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            
            if (users.find(u => u.username === username)) {
                document.getElementById('regError').textContent = 'Username already exists!';
                return;
            }
            
            users.push({ username, email, password });
            localStorage.setItem('users', JSON.stringify(users));
            
            document.getElementById('regError').textContent = '';
            document.getElementById('regSuccess').textContent = 'Registered! Now login.';
            
            setTimeout(() => showLogin(), 2000);
        }
        
        function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            let user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('currentUser', username);
                window.location.href = 'main.html';
            } else {
                document.getElementById('loginError').textContent = 'Invalid username or password!';
            }
        }
    </script>
</body>
</html>
